version: '3'

tasks:
  build:
    desc: Build the Lambda function using SAM
    cmds:
      - sam build

  deploy:
    desc: Deploy to AWS (use deploy:guided for first-time setup)
    deps: [build]
    preconditions:
      - sh: test -f samconfig.toml
        msg: "samconfig.toml not found. Run 'task deploy:guided' first for initial setup."
    cmds:
      - sam deploy

  deploy:guided:
    desc: Deploy with guided prompts (first time setup)
    deps: [build]
    cmds:
      - sam deploy --guided

  local:start:
    desc: Start local development environment (DynamoDB Local + SAM)
    deps: [local:db]
    preconditions:
      - sh: test -f env.json
        msg: "env.json not found. Run 'task admin:init' to generate encryption key and setup."
    cmds:
      - echo "DynamoDB Local running on http://localhost:8000"
      - echo "Starting SAM local API..."
      - sam local start-api --docker-network placepoll-net --env-vars env.json

  local:db:
    desc: Start DynamoDB Local in Docker
    preconditions:
      - sh: docker info >/dev/null 2>&1
        msg: "Docker is not running. Please start Docker Desktop or Docker daemon."
    cmds:
      - test -f env.json || cp env.example.json env.json
      - docker-compose up -d
      - sleep 2
      - |
        aws dynamodb create-table \
          --table-name placepoll-votes \
          --attribute-definitions AttributeName=voter,AttributeType=S \
          --key-schema AttributeName=voter,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://localhost:8000 \
          --region us-east-1 \
          --no-cli-pager 2>/dev/null || echo "Table already exists"

  local:create-table:
    desc: Create DynamoDB table in local database (standalone)
    preconditions:
      - sh: curl -s http://localhost:8000 >/dev/null 2>&1
        msg: "DynamoDB Local is not running on port 8000. Run 'task local:db' first."
    cmds:
      - |
        aws dynamodb create-table \
          --table-name placepoll-votes \
          --attribute-definitions AttributeName=voter,AttributeType=S \
          --key-schema AttributeName=voter,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://localhost:8000 \
          --region us-east-1 \
          --no-cli-pager 2>/dev/null || echo "Table already exists"

  local:stop:
    desc: Stop local development environment
    cmds:
      - docker-compose down

  validate:
    desc: Validate the SAM template
    cmds:
      - sam validate

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf .aws-sam
      - rm -f bootstrap

  logs:
    desc: Tail CloudWatch logs for the Lambda function
    cmds:
      - sam logs --tail

  delete:
    desc: Delete the CloudFormation stack
    cmds:
      - sam delete

  links:
    desc: Generate voter links (requires deployed API)
    cmds:
      - echo "After deployment, call GET /links to generate voter tokens"

  generate-key:
    desc: Generate a new AES-256 encryption key
    cmds:
      - go run ./cmd/genkey

  generate-admin-token:
    desc: Generate an admin token for accessing /results and /links
    preconditions:
      - sh: '[ -n "$AES_KEY" ]'
        msg: "AES_KEY environment variable not set. Export AES_KEY or run 'task admin:init' first."
    cmds:
      - go run ./cmd/gentoken

  admin:init:
    desc: Initialize admin setup (generate key, update env.json, generate admin token)
    preconditions:
      - sh: command -v jq >/dev/null 2>&1
        msg: "jq is required but not installed. Install with: sudo apt install jq (or brew install jq on macOS)"
    cmds:
      - task: generate-key
      - |
        test -f env.json || cp env.example.json env.json
        KEY=$(go run ./cmd/genkey 2>&1 | grep 'export AES_KEY=' | cut -d'"' -f2)
        jq '.PlacePollFunction.AES_KEY = "'$KEY'"' env.json > env.json.tmp && mv env.json.tmp env.json
        export AES_KEY="$KEY"
      - task: generate-admin-token

  help:
    desc: Show available tasks
    cmds:
      - task --list
