version: '3'

tasks:
  build:
    desc: Build the Lambda function using SAM
    cmds:
      - sam build

  deploy:
    desc: Deploy to AWS (use deploy:guided for first-time setup)
    deps: [build]
    preconditions:
      - sh: test -f samconfig.toml
        msg: "samconfig.toml not found. Run 'task deploy:guided' first for initial setup."
      - sh: test -f env.json
        msg: "env.json not found. Run 'task admin:init' first to generate encryption key."
      - sh: command -v jq >/dev/null 2>&1
        msg: "jq is required but not installed. Install with: sudo apt install jq (or brew install jq on macOS)"
    cmds:
      - |
        KEY=$(jq -r '.PlacePollFunction.AES_KEY' env.json)
        sam deploy --parameter-overrides "AESKey=$KEY"

  deploy:yes:
    desc: Deploy to AWS without confirmation prompt
    deps: [build]
    preconditions:
      - sh: test -f samconfig.toml
        msg: "samconfig.toml not found. Run 'task deploy:guided' first for initial setup."
      - sh: test -f env.json
        msg: "env.json not found. Run 'task admin:init' first to generate encryption key."
      - sh: command -v jq >/dev/null 2>&1
        msg: "jq is required but not installed. Install with: sudo apt install jq (or brew install jq on macOS)"
    cmds:
      - |
        KEY=$(jq -r '.PlacePollFunction.AES_KEY' env.json)
        sam deploy --parameter-overrides "AESKey=$KEY" --no-confirm-changeset

  deploy:guided:
    desc: Deploy with guided prompts (first time setup)
    deps: [build]
    preconditions:
      - sh: test -f env.json
        msg: "env.json not found. Run 'task admin:init' first to generate encryption key."
      - sh: command -v jq >/dev/null 2>&1
        msg: "jq is required but not installed. Install with: sudo apt install jq (or brew install jq on macOS)"
    cmds:
      - |
        KEY=$(jq -r '.PlacePollFunction.AES_KEY' env.json)
        echo "Using AES key from env.json"
        echo "When prompted for 'AESKey', enter: $KEY"
        echo ""
        sam deploy --guided --parameter-overrides "AESKey=$KEY"

  local:start:
    desc: Start local development environment (DynamoDB Local + SAM)
    deps: [local:db]
    preconditions:
      - sh: test -f env.json
        msg: "env.json not found. Run 'task admin:init' to generate encryption key and setup."
    cmds:
      - echo "DynamoDB Local running on http://localhost:8000"
      - echo "Starting SAM local API..."
      - sam local start-api --docker-network placepoll-net --env-vars env.json

  local:db:
    desc: Start DynamoDB Local in Docker
    preconditions:
      - sh: docker info >/dev/null 2>&1
        msg: "Docker is not running. Please start Docker Desktop or Docker daemon."
    cmds:
      - test -f env.json || cp env.example.json env.json
      - docker-compose up -d
      - sleep 2
      - |
        aws dynamodb create-table \
          --table-name placepoll-votes \
          --attribute-definitions AttributeName=voter,AttributeType=S \
          --key-schema AttributeName=voter,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://localhost:8000 \
          --region us-east-1 \
          --no-cli-pager 2>/dev/null || echo "Table already exists"

  local:create-table:
    desc: Create DynamoDB table in local database (standalone)
    preconditions:
      - sh: curl -s http://localhost:8000 >/dev/null 2>&1
        msg: "DynamoDB Local is not running on port 8000. Run 'task local:db' first."
    cmds:
      - |
        aws dynamodb create-table \
          --table-name placepoll-votes \
          --attribute-definitions AttributeName=voter,AttributeType=S \
          --key-schema AttributeName=voter,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --endpoint-url http://localhost:8000 \
          --region us-east-1 \
          --no-cli-pager 2>/dev/null || echo "Table already exists"

  local:stop:
    desc: Stop local development environment
    cmds:
      - pkill -f "sam local start-api" || true
      - docker-compose down

  validate:
    desc: Validate the SAM template
    cmds:
      - sam validate

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf .aws-sam
      - rm -f bootstrap

  logs:
    desc: Tail CloudWatch logs for the Lambda function
    cmds:
      - sam logs --tail

  delete:
    desc: Delete the CloudFormation stack
    cmds:
      - sam delete

  db:clear:
    desc: Clear all votes from production DynamoDB table
    prompt: This will DELETE ALL VOTES from production. Are you sure?
    cmds:
      - |
        echo "Current votes in database:"
        aws dynamodb scan \
          --table-name placepoll-votes \
          --region us-east-2 \
          --select COUNT \
          --output text | awk '{print "  Total votes: " $1}'
        echo ""
        echo "Clearing production database..."
        for voter in Lesley Casey Ron; do
          aws dynamodb delete-item \
            --table-name placepoll-votes \
            --key '{"voter":{"S":"'$voter'"}}' \
            --region us-east-2 2>/dev/null && echo "  Deleted vote for $voter" || echo "  No vote found for $voter"
        done
        echo ""
        echo "Verifying database is empty..."
        COUNT=$(aws dynamodb scan --table-name placepoll-votes --region us-east-2 --select COUNT --output text | awk '{print $1}')
        echo "  Remaining votes: $COUNT"
        if [ "$COUNT" = "0" ]; then
          echo "✓ Database successfully cleared!"
        else
          echo "⚠ Warning: $COUNT votes still remain in database"
        fi

  links:
    desc: Generate voter links (requires deployed API)
    cmds:
      - echo "After deployment, call GET /links to generate voter tokens"

  generate-admin-token:
    desc: Generate an admin token for accessing /results and /links
    preconditions:
      - sh: '[ -n "$AES_KEY" ]'
        msg: "AES_KEY environment variable not set. Export AES_KEY or run 'task admin:init' first."
    cmds:
      - go run ./cmd/gentoken

  admin:init:
    desc: Initialize admin setup (generate key, update env.json, generate admin token)
    preconditions:
      - sh: command -v jq >/dev/null 2>&1
        msg: "jq is required but not installed. Install with: sudo apt install jq (or brew install jq on macOS)"
    cmds:
      - |
        echo "Generating new AES-256 key..."
        test -f env.json || cp env.example.json env.json
        KEY=$(go run ./cmd/genkey 2>&1 | grep 'export AES_KEY=' | cut -d'"' -f2)
        echo "Generated key: $KEY"
        echo ""
        echo "Updating env.json..."
        jq '.PlacePollFunction.AES_KEY = "'$KEY'"' env.json > env.json.tmp && mv env.json.tmp env.json
        echo "Updated env.json with new key"
        echo ""
        echo "Generating admin token..."
        export AES_KEY="$KEY"
        go run ./cmd/gentoken
        echo ""
        echo "Setup complete! Your env.json has been configured."
        echo ""
        echo "To generate additional admin tokens later, run:"
        echo "  export AES_KEY=\"$KEY\""
        echo "  task generate-admin-token"

  help:
    desc: Show available tasks
    cmds:
      - task --list
